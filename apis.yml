apis:
  - name: Footprint Analytics Data API
    description: >
      Unified REST and SQL API providing access to NFT, DeFi, GameFi, and token
      analytics data across 30+ blockchain networks. Supports raw transaction
      data, pre-computed metrics, cross-chain aggregates, floor prices, TVL,
      DEX pool liquidity, wallet profiles, and game economics. Authentication
      via API key. Both free and paid enterprise tiers available.
